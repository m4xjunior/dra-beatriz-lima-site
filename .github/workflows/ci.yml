name: CI

# Verificação automática a cada push/PR — pega regressão de build antes de
# chegar em produção. Não faz deploy nenhum (isso continua manual/decisão
# do usuário sobre qual host); só confirma que o site e o servidor Rust
# compilam e passam no type-check.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  site-astro:
    name: Site (Astro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro check
      - run: npm run build

  servidor-rust:
    name: Servidor (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - run: cargo build --release
      - run: cargo test --release
