<!-- @dsCard group="Espaçamento & Grid" viewport="700x320" name="Escala de espaçamento" subtitle="Base 4px. Do inline fino ao ritmo de seção generoso." -->
<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box;margin:0}
body{background:var(--surface-base);font-family:var(--font-body);color:var(--text-body);padding:var(--size-5)}
.row{display:flex;align-items:center;gap:var(--size-4);padding:3px 0}
.tag{width:120px;flex:none;font-size:10px;text-transform:uppercase;letter-spacing:var(--letter-spacing-wide);color:var(--text-muted);font-variant-numeric:tabular-nums}
.bar{height:14px;background:var(--gradient-gold);border-radius:var(--radius-xs)}
</style></head><body>
<div class="row"><span class="tag">1 · 4px</span><div class="bar" style="width:var(--size-1)"></div></div>
<div class="row"><span class="tag">2 · 8px</span><div class="bar" style="width:var(--size-2)"></div></div>
<div class="row"><span class="tag">3 · 12px</span><div class="bar" style="width:var(--size-3)"></div></div>
<div class="row"><span class="tag">4 · 16px</span><div class="bar" style="width:var(--size-4)"></div></div>
<div class="row"><span class="tag">5 · 24px</span><div class="bar" style="width:var(--size-5)"></div></div>
<div class="row"><span class="tag">6 · 32px</span><div class="bar" style="width:var(--size-6)"></div></div>
<div class="row"><span class="tag">7 · 48px</span><div class="bar" style="width:var(--size-7)"></div></div>
<div class="row"><span class="tag">8 · 64px</span><div class="bar" style="width:var(--size-8)"></div></div>
<div class="row"><span class="tag">9 · 96px ·section</span><div class="bar" style="width:var(--size-9)"></div></div>
<div class="row"><span class="tag">10 · 128px</span><div class="bar" style="width:var(--size-10)"></div></div>
<div class="row"><span class="tag">11 · 160px</span><div class="bar" style="width:var(--size-11)"></div></div>
</body></html>
