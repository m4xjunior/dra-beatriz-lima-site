<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box;margin:0}
body{background:var(--surface-base);font-family:var(--font-body);color:var(--text-body);padding:var(--size-5)}
.ramp{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--size-2)}
.chip{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-subtle)}
.sw{height:64px}
.meta{padding:6px 8px;background:var(--surface-raised)}
.k{font-size:10px;letter-spacing:var(--letter-spacing-wide);text-transform:uppercase;color:var(--text-muted)}
.h{font-size:11px;font-variant-numeric:tabular-nums}
</style></head><body>
<div class="ramp">
<div class="chip"><div class="sw" style="background:var(--color-nude-100)"></div><div class="meta"><div class="k">nude 100 ·soft</div><div class="h">#F5E6DC</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-nude-200)"></div><div class="meta"><div class="k">nude 200</div><div class="h">#E9CDBC</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-nude-300)"></div><div class="meta"><div class="k">nude 300</div><div class="h">#D8AF9A</div></div></div>
</div>
</body></html>
