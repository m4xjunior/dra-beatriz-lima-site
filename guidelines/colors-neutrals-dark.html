<!-- @dsCard group="Cores" viewport="700x160" name="Neutros quentes — escuros" subtitle="Preto quente (nunca #000 puro) e a rampa de tinta para texto." -->
<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box;margin:0}
body{background:var(--surface-base);font-family:var(--font-body);color:var(--text-body);padding:var(--size-5)}
.ramp{display:grid;grid-template-columns:repeat(6,1fr);gap:var(--size-2)}
.chip{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-subtle)}
.sw{height:66px}
.meta{padding:6px 8px;background:var(--surface-raised)}
.k{font-size:10px;letter-spacing:var(--letter-spacing-wide);text-transform:uppercase;color:var(--text-muted)}
.h{font-size:11px;font-variant-numeric:tabular-nums}
</style></head><body>
<div class="ramp">
<div class="chip"><div class="sw" style="background:var(--color-ink-400)"></div><div class="meta"><div class="k">ink 400</div><div class="h">#8B8070</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-ink-500)"></div><div class="meta"><div class="k">500 ·muted</div><div class="h">#635A4C</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-ink-600)"></div><div class="meta"><div class="k">600</div><div class="h">#4A4236</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-ink-700)"></div><div class="meta"><div class="k">700</div><div class="h">#342E25</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-ink-800)"></div><div class="meta"><div class="k">800</div><div class="h">#241F18</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-ink-900)"></div><div class="meta"><div class="k">900 ·texto</div><div class="h">#1A1611</div></div></div>
</div>
</body></html>
