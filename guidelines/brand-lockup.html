<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box;margin:0}
body{background:var(--surface-base);font-family:var(--font-body);color:var(--text-body);padding:var(--size-6);display:flex;gap:var(--size-7);align-items:center;justify-content:center}
.mono{font-family:var(--font-display);font-weight:500;font-size:82px;line-height:.8;letter-spacing:.02em;background:var(--gradient-gold-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.rule{width:1px;height:120px;background:var(--color-gold-500)}
.lockup{text-align:left}
.name{font-family:var(--font-display);font-weight:500;text-transform:uppercase;letter-spacing:var(--letter-spacing-wider);font-size:var(--font-size-xl);color:var(--text-heading);line-height:1.1}
.sub{font-family:var(--font-body);text-transform:uppercase;letter-spacing:var(--letter-spacing-widest);font-size:11px;color:var(--text-accent);margin-top:10px}
.note{font-size:10px;color:var(--text-subtle);margin-top:var(--size-4);max-width:240px;line-height:1.5}
</style></head><body>
<div class="mono">BL</div>
<div class="rule"></div>
<div class="lockup">
<div class="name">Dra. Beatriz<br>Lima</div>
<div class="sub">Biomédica Esteta</div>
<div class="note">Placeholder tipográfico. Substituir por arquivo de marca oficial (SVG) quando fornecido.</div>
</div>
</body></html>
