<!-- @dsCard group="Tipografia" viewport="700x210" name="Caixa alta & tracking" subtitle="Eyebrows e rótulos em maiúsculas espaçadas. Três níveis de tracking." -->
<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box;margin:0}
body{background:var(--surface-base);font-family:var(--font-body);color:var(--text-body);padding:var(--size-5);display:flex;flex-direction:column;gap:var(--size-4);justify-content:center}
.row{display:flex;align-items:baseline;gap:var(--size-4)}
.tag{width:120px;flex:none;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-variant-numeric:tabular-nums}
.up{text-transform:uppercase;color:var(--text-body);font-size:15px}
.wide{letter-spacing:var(--letter-spacing-wide)}
.wider{letter-spacing:var(--letter-spacing-wider)}
.widest{letter-spacing:var(--letter-spacing-widest)}
.disp{font-family:var(--font-display);font-size:22px;text-transform:uppercase;letter-spacing:var(--letter-spacing-widest);color:var(--text-heading);font-weight:500}
</style></head><body>
<div class="row"><span class="tag">wide · .08em</span><span class="up wide">Preenchimento labial</span></div>
<div class="row"><span class="tag">wider · .16em</span><span class="up wider">Protocolos de pele</span></div>
<div class="row"><span class="tag">widest · .28em</span><span class="up widest">Agendar avaliação</span></div>
<div class="row" style="margin-top:8px;border-top:1px solid var(--border-subtle);padding-top:var(--size-4)"><span class="tag">display · caps</span><span class="disp">Biomédica Esteta</span></div>
</body></html>
