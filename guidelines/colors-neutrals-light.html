<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box;margin:0}
body{background:var(--surface-base);font-family:var(--font-body);color:var(--text-body);padding:var(--size-5)}
.ramp{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--size-2)}
.chip{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-subtle)}
.sw{height:66px}
.meta{padding:6px 8px;background:var(--surface-raised)}
.k{font-size:10px;letter-spacing:var(--letter-spacing-wide);text-transform:uppercase;color:var(--text-muted)}
.h{font-size:11px;font-variant-numeric:tabular-nums}
</style></head><body>
<div class="ramp">
<div class="chip"><div class="sw" style="background:var(--color-sand-50)"></div><div class="meta"><div class="k">sand 50</div><div class="h">#FBF9F4</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-sand-100)"></div><div class="meta"><div class="k">100 ·base</div><div class="h">#F6F1E8</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-sand-200)"></div><div class="meta"><div class="k">200 ·sunken</div><div class="h">#EEE6D7</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-sand-300)"></div><div class="meta"><div class="k">300</div><div class="h">#E3D8C5</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-sand-400)"></div><div class="meta"><div class="k">400 ·borda</div><div class="h">#CBBBA0</div></div></div>
</div>
</body></html>
