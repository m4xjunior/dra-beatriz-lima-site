<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box;margin:0}
body{background:var(--surface-base);font-family:var(--font-body);color:var(--text-body);padding:var(--size-5);display:flex;flex-direction:column;justify-content:center;gap:var(--size-4)}
.row{display:flex;align-items:center;gap:var(--size-4)}
.tag{width:150px;flex:none;font-size:10px;text-transform:uppercase;letter-spacing:var(--letter-spacing-wide);color:var(--text-muted);font-variant-numeric:tabular-nums}
.track{flex:1;height:2px;background:var(--border-subtle);position:relative;border-radius:var(--radius-pill)}
.dot{position:absolute;top:-5px;left:0;width:12px;height:12px;border-radius:var(--radius-pill);background:var(--color-gold-500);animation:slide 2.4s infinite}
.d1{animation-duration:1.6s}.d2{animation-duration:2.0s}.d3{animation-duration:2.6s}
.e2{animation-timing-function:cubic-bezier(0.16,1,0.3,1)}
@keyframes slide{0%{left:0}50%{left:calc(100% - 12px)}100%{left:0}}
</style></head><body>
<div class="row"><span class="tag">fast · 120ms</span><div class="track"><div class="dot d1"></div></div></div>
<div class="row"><span class="tag">base · 220ms</span><div class="track"><div class="dot d2"></div></div></div>
<div class="row"><span class="tag">slow · 420ms · entrance</span><div class="track"><div class="dot d3 e2"></div></div></div>
</body></html>
