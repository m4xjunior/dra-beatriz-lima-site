<!-- @dsCard group="Tipografia" viewport="700x230" name="Gradiente preto→dourado no texto" subtitle="Efeito assinatura via background-clip. Só display grande (contraste)." -->
<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box;margin:0}
body{background:var(--surface-base);font-family:var(--font-body);color:var(--text-body);padding:0;display:grid;grid-template-columns:1fr 1fr}
.pane{padding:var(--size-6) var(--size-5);display:flex;flex-direction:column;justify-content:center;gap:var(--size-3)}
.light{background:var(--surface-base)}
.dark{background:var(--surface-inverse)}
.ey{font-size:10px;text-transform:uppercase;letter-spacing:var(--letter-spacing-wider)}
.gt{font-family:var(--font-display);font-size:var(--font-size-4xl);font-weight:600;line-height:1;letter-spacing:-.01em;background:var(--gradient-gold-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.dark .gt{background:var(--gradient-gold-text-inverse);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.token{font-size:10px;color:var(--text-muted);letter-spacing:.04em}
.dark .token,.dark .ey{color:var(--text-muted)}
.dark .ey{color:var(--text-accent-on-inverse)}
.light .ey{color:var(--text-accent)}
</style></head><body>
<div class="pane light"><div class="ey">Sobre creme</div><div class="gt">Beleza<br>com critério</div><div class="token">--gradient-gold-text</div></div>
<div class="pane dark"><div class="ey">Sobre preto quente</div><div class="gt">Beleza<br>com critério</div><div class="token">--gradient-gold-text-inverse</div></div>
</body></html>
