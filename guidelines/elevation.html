<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box;margin:0}
body{background:var(--surface-base);font-family:var(--font-body);color:var(--text-body);padding:var(--size-6) var(--size-5);display:flex;gap:var(--size-6);align-items:center}
.item{text-align:center}
.box{width:118px;height:76px;background:var(--surface-raised);border-radius:var(--radius-card);border:1px solid var(--border-subtle)}
.k{font-size:10px;text-transform:uppercase;letter-spacing:var(--letter-spacing-wide);color:var(--text-muted);margin-top:12px}
.v{font-size:11px;color:var(--text-body)}
</style></head><body>
<div class="item"><div class="box" style="box-shadow:var(--shadow-none)"></div><div class="k">flat</div><div class="v">hairline só</div></div>
<div class="item"><div class="box" style="box-shadow:var(--shadow-sm);border-color:transparent"></div><div class="k">raised · sm</div><div class="v">card</div></div>
<div class="item"><div class="box" style="box-shadow:var(--shadow-md);border-color:transparent"></div><div class="k">floating · md</div><div class="v">dropdown</div></div>
<div class="item"><div class="box" style="box-shadow:var(--shadow-lg);border-color:transparent"></div><div class="k">overlay · lg</div><div class="v">modal</div></div>
</body></html>
