<!-- @dsCard group="Cores" viewport="700x180" name="Ouro — bronze ao champanhe" subtitle="Família dourada. Acento e tipografia, nunca fundo inteiro." -->
<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box;margin:0}
body{background:var(--surface-base);font-family:var(--font-body);color:var(--text-body);padding:var(--size-5)}
.ramp{display:grid;grid-template-columns:repeat(8,1fr);gap:var(--size-2)}
.chip{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-subtle)}
.sw{height:64px}
.meta{padding:6px 8px;background:var(--surface-raised)}
.k{font-size:10px;letter-spacing:var(--letter-spacing-wide);text-transform:uppercase;color:var(--text-muted)}
.h{font-size:11px;color:var(--text-body);font-variant-numeric:tabular-nums}
</style></head><body>
<div class="ramp">
<div class="chip"><div class="sw" style="background:var(--color-gold-100)"></div><div class="meta"><div class="k">100</div><div class="h">#F4E8CC</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-gold-200)"></div><div class="meta"><div class="k">200</div><div class="h">#E9D3A3</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-gold-300)"></div><div class="meta"><div class="k">300</div><div class="h">#DBBE7C</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-gold-400)"></div><div class="meta"><div class="k">400</div><div class="h">#C9A65C</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-gold-500)"></div><div class="meta"><div class="k">500 ·marca</div><div class="h">#B58E45</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-gold-600)"></div><div class="meta"><div class="k">600</div><div class="h">#997438</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-gold-700)"></div><div class="meta"><div class="k">700 ·texto</div><div class="h">#7A5B2B</div></div></div>
<div class="chip"><div class="sw" style="background:var(--color-gold-800)"></div><div class="meta"><div class="k">800</div><div class="h">#5C4420</div></div></div>
</div>
</body></html>
