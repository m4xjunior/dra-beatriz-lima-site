<!-- @dsCard group="Marca" viewport="700x220" name="Motivos — fio dourado & chave {" subtitle="Hairline de 1px como divisor; chave { como marcador de listagem." -->
<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box;margin:0}
body{background:var(--surface-base);font-family:var(--font-body);color:var(--text-body);padding:var(--size-6) var(--size-5);display:grid;grid-template-columns:1fr 1fr;gap:var(--size-6);align-items:center}
.ey{font-size:10px;text-transform:uppercase;letter-spacing:var(--letter-spacing-wider);color:var(--text-muted);margin-bottom:var(--size-4)}
.hairline{height:1px;background:var(--color-gold-500);margin:var(--size-3) 0}
.hair-fade{height:1px;background:var(--gradient-hairline);margin:var(--size-3) 0}
.list{list-style:none;display:flex;flex-direction:column;gap:var(--size-3)}
.list li{display:flex;gap:var(--size-3);align-items:baseline;font-size:var(--font-size-md);color:var(--text-body);font-weight:300}
.br{font-family:var(--font-display);color:var(--color-gold-500);font-size:22px;line-height:1;flex:none}
</style></head><body>
<div><div class="ey">Fio dourado · divisor</div><div class="hairline"></div><div style="font-family:var(--font-display);font-size:var(--font-size-xl);color:var(--text-heading)">Ciência</div><div class="hair-fade"></div><div style="font-size:12px;color:var(--text-muted)">sólido &amp; com fade nas pontas</div></div>
<div><div class="ey">Chave { · listagem</div><ul class="list"><li><span class="br">{</span>Ética</li><li><span class="br">{</span>Escuta</li><li><span class="br">{</span>Respeito</li></ul></div>
</body></html>
