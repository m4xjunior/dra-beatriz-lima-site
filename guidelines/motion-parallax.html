<!-- @dsCard group="Movimento (GSAP)" viewport="720x340" name="Parallax em camadas (GSAP)" subtitle="Role dentro do painel: orb, título e grão movem em ritmos diferentes. Recurso: ScrollTrigger scrub." -->
<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
<script src="../motion/bl-motion.js"></script>
<style>
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{font-family:var(--font-body)}
.scroller{position:relative;height:100vh;overflow-y:auto;background-color:var(--color-obsidian-900);background-image:var(--mesh-immersive)}
.scroller::-webkit-scrollbar{width:8px}.scroller::-webkit-scrollbar-thumb{background:var(--color-gold-700);border-radius:99px}
.track{position:relative;height:230%}
.layer{position:sticky;top:0;height:100vh;display:flex;align-items:center;justify-content:center;pointer-events:none}
.orb{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(38% 38% at 40% 34%, var(--color-champagne), var(--color-gold-400) 46%, var(--color-gold-700) 78%);box-shadow:var(--bloom-gold-strong);top:8%;left:8%;opacity:.7}
.word{position:relative;font-family:var(--font-display);font-weight:800;font-size:88px;letter-spacing:var(--letter-spacing-tighter);background:var(--gradient-metal);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.grain{position:absolute;inset:-30% 0;background-image:var(--grain);opacity:var(--grain-opacity-dark);mix-blend-mode:overlay}
.hint{position:fixed;bottom:12px;left:12px;z-index:5;font-size:10px;text-transform:uppercase;letter-spacing:var(--letter-spacing-wide);color:var(--color-gold-300);background:var(--veil-dark-3);padding:6px 12px;border-radius:var(--radius-pill);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
</style></head><body>
<div class="scroller" id="sc">
<div class="track">
<div class="grain" data-bl-parallax="0.15"></div>
<div class="layer"><div class="orb" data-bl-parallax="0.55"></div></div>
<div class="layer"><div class="word" data-bl-parallax="0.28">clareza</div></div>
</div>
</div>
<div class="hint">role dentro do painel ↓</div>
<script>
BLMotion.ready().then(function(){
  var sc = document.getElementById("sc");
  BLMotion.parallax("[data-bl-parallax]", { scroller: sc });
});
</script>
</body></html>
